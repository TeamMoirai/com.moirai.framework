name: build-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "tag: git tag you want create. (sample 1.0.0)"
        required: true
      dry-run:
        description: "dry-run: true will never create release/nuget."
        required: true
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  update-packagejson:
    permissions:
      actions: read
      contents: write
    uses: TeamMoirai/GitHubActions/.github/workflows/update-packagejson.yaml@main
    with:
      file-path: ./package.json
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run || false }}

  # release
  create-release:
    needs: [update-packagejson]
    permissions:
      contents: write
      id-token: write # required for NuGet Trusted Publish
    uses: TeamMoirai/GitHubActions/.github/workflows/create-release.yaml@main
    with:
      commit-id: ${{ needs.update-packagejson.outputs.sha }}
      dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run || false }}
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      nuget-push: false
      release-format: "{0}"
      release-upload: false
    secrets: inherit

  cleanup:
    if: ${{ needs.update-packagejson.outputs.is-branch-created == 'true' }}
    needs: [update-packagejson, create-release]
    permissions:
      contents: write
    uses: TeamMoirai/GitHubActions/.github/workflows/clean-packagejson-branch.yaml@main
    with:
      branch: ${{ needs.update-packagejson.outputs.branch-name }}